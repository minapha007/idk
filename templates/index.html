<!DOCTYPE html>
<html>
<head>
    <title>My Data Website</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        input { padding: 5px; margin: 5px; }
        button { padding: 5px 10px; background: red; color: white; border: none; cursor: pointer; }
        .item { border: 1px solid #ccc; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>My Data Storage</h1>
    
    <div>
        <input type="text" id="name" placeholder="Item name">
        <input type="text" id="description" placeholder="Description">
        <button onclick="addItem()">Add Item</button>
    </div>

    <h2>Items:</h2>
    <div id="items">
        {% for item in items %}
        <div class="item">
            <strong>{{ item[1] }}</strong>: {{ item[2] }}
        </div>
        {% endfor %}
    </div>

    <script>
        function addItem() {
            const name = document.getElementById('name').value;
            const description = document.getElementById('description').value;
            
            fetch('/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: name, description: description})
            }).then(() => location.reload());
        }
    </script>
</body>
</html>
